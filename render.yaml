services:
  - type: web
    name: perf-lens-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w server && npm run build -w worker
    startCommand: sh -c "node worker/dist/index.js & node server/dist/index.js & wait -n"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: UPLOAD_MAX_MB
        value: "200"
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: BILLING_SUCCESS_URL
        sync: false
      - key: BILLING_CANCEL_URL
        sync: false
      - key: TEAM_PLAN_CONTACT_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_INDIVIDUAL_MONTHLY
        sync: false
      - key: STRIPE_PRICE_INDIVIDUAL_QUARTERLY
        sync: false
      - key: STRIPE_PRICE_INDIVIDUAL_ANNUAL
        sync: false

  - type: web
    name: perf-lens-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
